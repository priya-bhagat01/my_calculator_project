<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="Calculatorproject.css">
	<script src="Calculatorproject.js" defer></script>
	<title>Calculator</title>
</head>
<body>
	<div class="section1">
	<button onclick="
	updateCalculation('1');">1</button>
	<button onclick="
	updateCalculation('2');">2</button>
	<button onclick="
	updateCalculation('3');">3</button>
	<button onclick="
	updateCalculation('+');">+</button><br></div>
	<div class="section2">
	<button onclick="
	updateCalculation('4');">4</button>
	<button onclick="
	updateCalculation('5');">5</button>
	<button onclick="
	updateCalculation('6');">6</button>
	<button onclick="
	updateCalculation('-');">-</button><br></div>
	<div class="section3">
	<button onclick="
	updateCalculation('7');">7</button>
	<button onclick="
	updateCalculation('8');">8</button>
	<button onclick="
	updateCalculation('9');">9</button>
	<button onclick="
	updateCalculation('*');">*</button><br></div>
	<div class="section4">
	<button onclick="
	updateCalculation('0');">0</button>
	<button onclick="
	updateCalculation('.');">.</button>
	<button onclick="
	updateCalculation('/');">/</button>
	<button onclick="
	calculation = eval(calculation);
	console.log(calculation);">=</button></div>
	<button onclick="
	calculation = '';
	console.log('Cleared.')">Clear</button>
</body>
</html>
